<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Simulator</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/ChatGPT Image 16 de fev. de 2026, 20_08_37.png">
    <link rel="stylesheet" href="assets/css/style.css">
</head>

<body>
    <header>
        <h1>Pokémon Battle Simulator</h1>
    </header>
    <main>
        <section class="container">
            <div class="card card-azul">
                <h2>JOGADOR 1</h2>

                <button class="search-poke player-blue" type="submit">Escolha seu Pokémon</button>

                <div class="pokemon azul">

                    <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">

                    <div class="poke-infor">
                        <h3 class="poke-name">Pokémon</h3>

                        <span class="type"></span>

                        <div class="atributes">
                            <div class="hp">
                                <h3>HP</h3>
                                <p>...</p>
                            </div>

                            <div class="ataque">
                                <h3>Ataque</h3>
                                <p>...</p>
                            </div>

                            <div class="defesa">
                                <h3>Defesa</h3>
                                <p>...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

            <div class="status-batalha">
                <h2>AGUARDANDO LUTADORES...</h2>
                <form class="batalha-form">
                    <button type="submit">BATALHAR</button>
                </form>
            </div>

            <div class="card card-vermelho">
                <h2>JOGADOR 2</h2>

                <button class="search-poke player-red" type="submit">Escolha seu Pokémon</button>

                <div class="pokemon vermelho">

                    <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">

                    <div class="poke-infor">
                        <h3 class="poke-name">Pokémon</h3>

                        <span class="type"></span>

                        <div class="atributes">
                            <div class="hp">
                                <h3>HP</h3>
                                <p>...</p>
                            </div>

                            <div class="ataque">
                                <h3>Ataque</h3>
                                <p>...</p>
                            </div>

                            <div class="defesa">
                                <h3>Defesa</h3>
                                <p>...</p>
                            </div>
                        </div>
                    </div>
                </div>
            </div>

        </section>

    </main>

    <script type="module" src="assets/js/controller.js"></script>
</body>

</html>

<!-- 
     Instruções para quem vai montar o HTML:
    - Criar duas áreas principais: uma para o Jogador 1 e outra para o Jogador 2.
    - Cada jogador deve ter:
       > Um campo de texto (input) para digitar o nome do Pokémon.
       > Um botão "Buscar" para fazer a requisição.
       > Um espaço (div) onde aparecerão os dados do Pokémon.
    - Criar um botão "BATALHAR" que só será exibido quando os dois jogadores tiverem escolhido seus Pokémon.
    - Adicionar também uma estrutura de modal (div oculta) para mostrar o resultado da batalha e o botão "Jogar Novamente".
    - Seguir boas práticas de semântica (usar <section>, <main>, <footer>, etc.).
  -->
