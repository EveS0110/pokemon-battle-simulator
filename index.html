<!DOCTYPE html>
<html lang="pt-BR">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pokémon Battle Simulator</title>
    <link rel="icon" type="image/png" sizes="32x32" href="./assets/img/ChatGPT Image 16 de fev. de 2026, 20_08_37.png">
    <link rel="stylesheet" href="assets/css/style.css">
   
</head>

<body>
    <header>
        <h1>Pokémon Battle Simulator</h1>
    </header>

    <main>
        <main>
  <section class="container">

    <!-- ======== JOGADOR 1 ======== -->
    <div class="card card-azul">
      <h2>JOGADOR 1</h2>
      <button class="search-poke player-blue">Escolha seus Pokémons</button>

      <!-- Primeiro Pokémon -->
      <div id="playerOne" class="pokemon azul">
        <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">
        <div class="poke-infor">
          <h3 class="poke-name">Pokémon</h3>
          <span class="type"></span>
          <div class="atributes">
            <div class="hp"><h3>HP</h3><p>...</p></div>
            <div class="ataque"><h3>Ataque</h3><p>...</p></div>
            <div class="defesa"><h3>Defesa</h3><p>...</p></div>
          </div>
        </div>
      </div>

      <!-- Segundo Pokémon -->
      <div id="playerOneB" class="pokemon azul">
        <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">
        <div class="poke-infor">
          <h3 class="poke-name">Pokémon</h3>
          <span class="type"></span>
          <div class="atributes">
            <div class="hp"><h3>HP</h3><p>...</p></div>
            <div class="ataque"><h3>Ataque</h3><p>...</p></div>
            <div class="defesa"><h3>Defesa</h3><p>...</p></div>
          </div>
        </div>
      </div>
    </div>

    <!-- ======== STATUS CENTRAL ======== -->
    <div class="status-batalha">
      <h2>AGUARDANDO LUTADORES...</h2>
      <button type="button">BATALHAR</button>
    </div>

    <!-- ======== JOGADOR 2 ======== -->
    <div class="card card-vermelho">
      <h2>JOGADOR 2</h2>
      <button class="search-poke player-red">Escolha seus Pokémons</button>

      <!-- Primeiro Pokémon -->
      <div id="playerTwo" class="pokemon vermelho">
        <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">
        <div class="poke-infor">
          <h3 class="poke-name">Pokémon</h3>
          <span class="type"></span>
          <div class="atributes">
            <div class="hp"><h3>HP</h3><p>...</p></div>
            <div class="ataque"><h3>Ataque</h3><p>...</p></div>
            <div class="defesa"><h3>Defesa</h3><p>...</p></div>
          </div>
        </div>
      </div>

      <!-- Segundo Pokémon -->
      <div id="playerTwoB" class="pokemon vermelho">
        <img class="poke-img" src="./assets/img/MysteryPokemon-300x300.webp" alt="">
        <div class="poke-infor">
          <h3 class="poke-name">Pokémon</h3>
          <span class="type"></span>
          <div class="atributes">
            <div class="hp"><h3>HP</h3><p>...</p></div>
            <div class="ataque"><h3>Ataque</h3><p>...</p></div>
            <div class="defesa"><h3>Defesa</h3><p>...</p></div>
          </div>
        </div>
      </div>
    </div>

  </section>
</main>

    <script type="module" src="assets/js/index.js"></script>
    
    
</body>

</html>
